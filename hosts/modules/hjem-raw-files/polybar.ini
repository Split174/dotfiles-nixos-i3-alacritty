;==========================================================
; Polybar config (перенос с i3status)
; Путь: ~/.config/polybar/config.ini
;==========================================================

[colors]
background   = #2f343f
foreground   = #FFFFFF
good         = #00e6ac
bad          = #ff0000
degraded     = #ffff66
white        = #FFFFFF
netbird      = #00e6ac

;==========================================================
; BAR
;==========================================================
[bar/main]
bottom = true
width  = 100%
height = 26
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

padding-left  = 1
padding-right = 2
module-margin-left  = 1
module-margin-right = 1

; Используй шрифт с поддержкой Nerd Font иконок (󰖂 󰕾 ⛁ и т.д.)
font-0 = "DejaVu Sans Mono:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=11;2"
font-2 = "Symbols Nerd Font:size=12;2"

modules-left   =
modules-center =
modules-right = netbird disk wireless ethernet temperature volume date tray

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc = true

;==========================================================
; NetBird (аналог path_exists для /sys/class/net/wt0)
;==========================================================
[module/netbird]
type = custom/script
exec = if [ -e /sys/class/net/wt0 ]; then echo "%{F#00e6ac} 󰖂 NetBird On %{F-}"; fi
interval = 5

;==========================================================
; DISK (disk "/")
;==========================================================
[module/disk]
type = internal/fs
mount-0 = /
interval = 30
label-mounted = " ⛁ %free%"
format-mounted-foreground = ${colors.white}

;==========================================================
; WIRELESS (wireless _first_)
;==========================================================
[module/wireless]
type = internal/network
interface = wlp3s0
interface-type = wireless
interval = 3

format-connected = <label-connected>
label-connected = "%{F#FFFFFF}  %essid% (%signal%%) %local_ip%%{F-}"
format-disconnected =
label-disconnected =

;==========================================================
; ETHERNET (ethernet _first_)
;==========================================================
[module/ethernet]
type = internal/network
; смени на своё имя интерфейса
interface = eth0
interface-type = wired
interval = 3

format-connected = <label-connected>
label-connected = "%{F#FFFFFF}%local_ip% | %linkspeed%%{F-}"
format-disconnected =
label-disconnected =

;==========================================================
; CPU TEMPERATURE (cpu_temperature 0)
;==========================================================
[module/temperature]
type = internal/temperature
interval = 1
; раскомментируй и укажи путь, если автоопределение не работает:
; hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input
thermal-zone = 0
warn-temperature = 80

format = <label>
label = " %temperature-c% "
format-warn = <label-warn>
label-warn = " %temperature-c% "
label-warn-foreground = ${colors.bad}

;==========================================================
; VOLUME (volume master)
;==========================================================
; Вариант для PulseAudio / PipeWire:
; [module/volume]
; type = internal/pulseaudio
; sink = @DEFAULT_SINK@
; use-ui-max = false
; interval = 5

; format-volume = <label-volume>
; label-volume = "󰕾 %percentage%%"

; format-muted = <label-muted>
; label-muted = "󰖁 -%percentage%%-"

; --- Если у тебя чистый ALSA (без Pulse), используй вместо блока выше: ---
[module/volume]
type = internal/alsa
master-mixer = Master
format-volume = <label-volume>
label-volume = "󰕾 %percentage%%"
format-muted = <label-muted>
label-muted = "󰖁 -%percentage%%-"

;==========================================================
; DATE / TIME (tztime local)
;==========================================================
[module/date]
type = internal/date
interval = 1
date = " %d.%m.%Y %H:%M"
label = %date%

;==========================================================
; Tray
;==========================================================
[module/tray]
type = internal/tray
tray-spacing = 8
tray-padding = 2

;==========================================================
; settings
;==========================================================
[settings]
screenchange-reload = true
pseudo-transparency = false
