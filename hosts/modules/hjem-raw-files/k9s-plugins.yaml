# ../modules/k9s-plugins.yaml
plugins:
  flux-reconcile:
    command: bash
    args:
      - -c
      - |
        case "$RESOURCE_NAME" in
          gitrepositories)  CMD="source git" ;;
          ocirepositories)  CMD="source oci" ;;
          buckets)          CMD="source bucket" ;;
          helmrepositories) CMD="source helm" ;;
          kustomizations)   CMD="kustomization" ;;
          helmreleases)     CMD="helmrelease" ;;
          *)                CMD="${RESOURCE_NAME%s}" ;;
        esac
        flux reconcile $CMD $NAME -n $NAMESPACE 2>&1 | less
    shortCut: Shift-R
    description: Flux Reconcile
    scopes:
      - kustomization
      - helmrelease
      - gitrepository
      - ocirepository
      - bucket
crossplane-event:
  command: bash
  args:
    - -c
    - |
      NS=""
      [ -n "$NAMESPACE" ] && NS="-n $NAMESPACE"
      {
        echo "=================== EVENTS ==================="
        kubectl get events --all-namespaces \
          --field-selector involvedObject.name=$NAME,involvedObject.kind=$RESOURCE_NAME \
          --sort-by='.lastTimestamp'
        echo ""
        echo "=================== STATUS ==================="
        kubectl get $RESOURCE_NAME $NAME $NS -o yaml | yq '.status'
      } 2>&1 | less
  shortCut: Shift-E
  description: Crossplane Events + Status
  scopes:
    - ansibleruns
    - providerconfigs
    - cluster
